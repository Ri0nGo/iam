app:
  name: iam
  env: dev
  host: 0.0.0.0
  port: 8080

mysql:
  host: ubuntu
  port: 3306
  user: root
  password: 123456
  dbname: iam
  log_sql: true
  max_idle_conns: 10
  max_open_conns: 50
  conn_max_lifetime: 3600

redis:
  host: ubuntu
  port: 6379
  password: "123456"
  db: 3

jwt:
  issuer: iam
  secret: change-me-in-prod
  expire_seconds: 7200

security:
  password_cost: 12
  login_fail_limit: 5
  login_fail_window_seconds: 900

oauth:
  authorize_code_expire_seconds: 300
  login_url: http://localhost:5173/login
