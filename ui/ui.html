<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAM 身份与访问管理</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #3B5BDB;
  --brand-light: #EDF2FF;
  --brand-mid: #748FFC;
  --bg: #F8F9FC;
  --surface: #FFFFFF;
  --surface2: #F1F3F9;
  --border: #E8EAF0;
  --border2: #D0D5E8;
  --text: #1A1D2E;
  --text2: #5A6080;
  --text3: #9BA3BF;
  --success: #2F9E44;
  --success-bg: #EBFBEE;
  --warn: #E67700;
  --warn-bg: #FFF4E6;
  --danger: #C92A2A;
  --danger-bg: #FFF5F5;
  --info-bg: #EDF2FF;
  --shadow: 0 1px 3px rgba(26,29,46,.07), 0 4px 16px rgba(26,29,46,.05);
  --shadow-lg: 0 8px 32px rgba(26,29,46,.12), 0 2px 8px rgba(26,29,46,.06);
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --sidebar-w: 230px;
  --topbar-h: 56px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-brand {
  height: var(--topbar-h);
  padding: 0 18px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--brand);
  display: flex; align-items: center; justify-content: center;
}
.brand-icon svg { width: 17px; height: 17px; fill: white; }
.brand-name { font-size: 14.5px; font-weight: 600; letter-spacing: -.2px; }
.brand-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

.nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section-label {
  font-size: 10.5px; font-weight: 600; color: var(--text3);
  letter-spacing: .07em; text-transform: uppercase;
  padding: 10px 10px 5px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 8px;
  color: var(--text2); font-size: 13.5px; font-weight: 400;
  cursor: pointer; transition: all .15s; margin-bottom: 1px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 500; }
.nav-item.active svg { opacity: 1; }
.nav-badge {
  margin-left: auto; font-size: 11px; font-weight: 600;
  background: var(--brand); color: white;
  padding: 1px 7px; border-radius: 20px; min-width: 20px; text-align: center;
}
.nav-item.active .nav-badge { background: var(--brand); }

.sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid var(--border);
}
.user-card {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 8px;
  cursor: pointer; transition: background .15s;
}
.user-card:hover { background: var(--surface2); }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--brand-light); color: var(--brand);
  font-size: 11.5px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.avatar.sm { width: 26px; height: 26px; font-size: 10px; }
.avatar.green { background: var(--success-bg); color: var(--success); }
.avatar.orange { background: var(--warn-bg); color: var(--warn); }
.avatar.red { background: var(--danger-bg); color: var(--danger); }
.user-name { font-size: 13px; font-weight: 500; }
.user-sub { font-size: 11px; color: var(--text3); }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── Topbar ── */
.topbar {
  height: var(--topbar-h); flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 22px; gap: 12px;
}
.topbar-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -.2px; }
.search {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 0 12px; height: 34px; width: 210px;
  transition: border-color .15s, box-shadow .15s;
}
.search:focus-within { border-color: var(--brand-mid); box-shadow: 0 0 0 3px rgba(59,91,219,.1); }
.search svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text3); }
.search input { border: none; background: none; outline: none; font-size: 13px; color: var(--text); width: 100%; }
.search input::placeholder { color: var(--text3); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* ── Buttons ── */
.btn {
  height: 34px; padding: 0 14px; border-radius: 8px;
  font-size: 13px; font-weight: 500; border: 1px solid var(--border2);
  background: var(--surface); color: var(--text);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s; white-space: nowrap;
}
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn:active { transform: scale(.98); }
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn-primary { background: var(--brand); color: white; border-color: var(--brand); }
.btn-primary:hover { background: #3451C7; border-color: #3451C7; }
.btn-danger { background: var(--danger-bg); color: var(--danger); border-color: #FFC9C9; }
.btn-danger:hover { background: #FFE3E3; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 6px; }
.btn-icon { width: 28px; height: 28px; padding: 0; justify-content: center; }

/* ── Content ── */
.content { flex: 1; overflow-y: auto; padding: 22px 24px; }
.page { display: none; }
.page.active { display: block; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.stats-3 { grid-template-columns: repeat(3,1fr); }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 18px;
}
.stat-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 8px; }
.stat-value { font-size: 26px; font-weight: 600; letter-spacing: -.5px; line-height: 1; margin-bottom: 6px; }
.stat-note { font-size: 11.5px; color: var(--text3); }
.stat-note.up { color: var(--success); }
.stat-note.warn { color: var(--warn); }

/* ── Card ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  margin-bottom: 16px;
}
.card-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 600; }
.card-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 11.5px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .05em;
  padding: 10px 16px; text-align: left;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  font-size: 13.5px; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr { transition: background .12s; }
tbody tr:hover td { background: #FAFBFF; }
.td-check { width: 40px; }
input[type="checkbox"] { accent-color: var(--brand); width: 15px; height: 15px; cursor: pointer; }

/* ── Status ── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11.5px; font-weight: 500; white-space: nowrap;
}
.badge::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.badge-green { background: var(--success-bg); color: var(--success); }
.badge-green::before { background: var(--success); }
.badge-gray { background: var(--surface2); color: var(--text2); }
.badge-gray::before { background: var(--text3); }
.badge-red { background: var(--danger-bg); color: var(--danger); }
.badge-red::before { background: var(--danger); }
.badge-orange { background: var(--warn-bg); color: var(--warn); }
.badge-orange::before { background: var(--warn); }
.tag {
  display: inline-block; padding: 2px 8px; border-radius: 5px;
  font-size: 11.5px; font-weight: 500; margin: 1px 2px;
  background: var(--brand-light); color: var(--brand);
}
.tag-green { background: var(--success-bg); color: var(--success); }
.tag-orange { background: var(--warn-bg); color: var(--warn); }
.tag-red { background: var(--danger-bg); color: var(--danger); }
.tag-gray { background: var(--surface2); color: var(--text2); }

/* ── Pagination ── */
.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 0; font-size: 12.5px; color: var(--text2);
}
.pages { display: flex; gap: 4px; }
.page-btn {
  min-width: 30px; height: 28px; padding: 0 8px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2);
  font-size: 12.5px; font-family: var(--font);
  cursor: pointer; transition: all .12s;
  display: flex; align-items: center; justify-content: center;
}
.page-btn:hover { background: var(--surface2); color: var(--text); }
.page-btn.active { background: var(--brand); color: white; border-color: var(--brand); }

/* ── Roles grid ── */
.roles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.role-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  transition: box-shadow .15s;
}
.role-card:hover { box-shadow: var(--shadow); }
.role-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.role-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.role-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.role-desc { font-size: 12px; color: var(--text2); }
.role-footer {
  display: flex; gap: 14px; margin-top: 12px;
  padding-top: 10px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text2);
}
.role-footer span { color: var(--text); font-weight: 500; }

/* ── Perm grid ── */
.perm-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 16px; }
.perm-item {
  background: var(--surface2); border-radius: 8px;
  padding: 9px 12px; display: flex; align-items: center; gap: 8px;
  font-size: 12.5px;
}
.perm-check {
  width: 17px; height: 17px; border-radius: 5px;
  background: var(--brand);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.perm-check svg { width: 10px; height: 10px; stroke: white; stroke-width: 2.5; fill: none; }
.perm-deny { background: var(--surface2); border: 1px solid var(--border); }
.perm-deny.perm-check { background: var(--surface2); }

/* ── Action row ── */
.action-row { display: flex; gap: 6px; flex-wrap: nowrap; }

/* ── Modal overlay ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,20,40,.45); z-index: 1000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg); width: 520px; max-width: 95vw;
  max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
  animation: modalIn .2s cubic-bezier(.34,1.4,.64,1);
}
.modal-lg { width: 660px; }
@keyframes modalIn {
  from { opacity: 0; transform: scale(.94) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); transition: all .12s;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-close svg { width: 14px; height: 14px; }
.modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
  flex-shrink: 0;
}

/* ── Form ── */
.form-row { margin-bottom: 16px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
label { display: block; font-size: 12.5px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.required::after { content: ' *'; color: var(--danger); }
input[type=text], input[type=email], input[type=password], select, textarea {
  width: 100%; height: 36px;
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 0 12px; font-size: 13.5px; color: var(--text);
  background: var(--surface); outline: none;
  transition: border-color .15s, box-shadow .15s;
}
input[type=text]:focus, input[type=email]:focus, input[type=password]:focus,
select:focus, textarea:focus {
  border-color: var(--brand-mid); box-shadow: 0 0 0 3px rgba(59,91,219,.1);
}
textarea { height: 80px; padding: 9px 12px; resize: vertical; }
select { -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%239BA3BF' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; }

/* ── Confirm modal ── */
.confirm-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
}
.confirm-title { text-align: center; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.confirm-desc { text-align: center; font-size: 13.5px; color: var(--text2); line-height: 1.6; }

/* ── Toast ── */
.toast-wrap { position: fixed; bottom: 22px; right: 22px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--text); color: white; padding: 11px 16px;
  border-radius: 10px; font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 9px;
  box-shadow: var(--shadow-lg); min-width: 220px;
  animation: toastIn .2s ease;
}
.toast svg { width: 16px; height: 16px; flex-shrink: 0; }
.toast.success { background: #1A3A24; }
.toast.error { background: #3A1A1A; }
@keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

/* ── Breadcrumb ── */
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); margin-bottom: 16px; }
.breadcrumb a { color: var(--text3); text-decoration: none; }
.breadcrumb a:hover { color: var(--brand); }
.breadcrumb-sep { color: var(--border2); }
.breadcrumb-cur { color: var(--text2); font-weight: 500; }

/* ── Empty state ── */
.empty {
  padding: 50px 20px; text-align: center;
}
.empty svg { width: 40px; height: 40px; color: var(--text3); margin: 0 auto 12px; }
.empty-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.empty-desc { font-size: 13px; color: var(--text2); }

/* ── App page cards ── */
.app-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 20px; }
.app-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  transition: box-shadow .15s, border-color .15s;
  cursor: pointer;
}
.app-card:hover { box-shadow: var(--shadow); border-color: var(--border2); }
.app-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.app-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.app-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.app-url { font-size: 11.5px; color: var(--text3); font-family: var(--mono); }
.app-meta { display: flex; gap: 10px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); }
.app-meta span { color: var(--text); font-weight: 500; }

/* ── Audit ── */
.audit-tag { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; color: var(--text2); }
.audit-tag.create { background: var(--success-bg); border-color: #B2F2BB; color: var(--success); }
.audit-tag.update { background: var(--info-bg); border-color: #BAC8FF; color: var(--brand); }
.audit-tag.delete { background: var(--danger-bg); border-color: #FFC9C9; color: var(--danger); }
.audit-tag.login  { background: var(--warn-bg); border-color: #FFD8A8; color: var(--warn); }

/* ── Bulk bar ── */
.bulk-bar {
  display: none; position: sticky; top: 0; z-index: 10;
  background: var(--brand); color: white;
  padding: 10px 18px; border-radius: var(--radius);
  margin-bottom: 14px; align-items: center; gap: 12px;
  font-size: 13.5px; font-weight: 500;
}
.bulk-bar.open { display: flex; }
.bulk-bar-actions { margin-left: auto; display: flex; gap: 8px; }
.bulk-btn {
  height: 28px; padding: 0 12px; border-radius: 6px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  color: white; font-size: 12.5px; font-family: var(--font);
  cursor: pointer; transition: background .12s;
}
.bulk-btn:hover { background: rgba(255,255,255,.25); }
.bulk-btn.danger { background: rgba(201,42,42,.7); border-color: transparent; }
.bulk-btn.danger:hover { background: rgba(201,42,42,.9); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<div class="app">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm-2 10.4L5.6 10l1.4-1.4 1 1 4-4 1.4 1.4-5.4 5.4z"/></svg>
    </div>
    <div>
      <div class="brand-name">IAM Console</div>
      <div class="brand-sub">身份与访问管理</div>
    </div>
  </div>

  <nav class="nav">
    <div class="nav-section-label">核心管理</div>
    <button class="nav-item active" onclick="nav('users',this)">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/></svg>
      用户管理
      <span class="nav-badge" id="badge-users">0</span>
    </button>
    <button class="nav-item" onclick="nav('apps',this)">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1v-2zm0 6a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg>
      应用管理
      <span class="nav-badge" id="badge-apps">0</span>
    </button>
    <button class="nav-item" onclick="nav('roles',this)">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884zM18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
      角色管理
      <span class="nav-badge" id="badge-roles">0</span>

const PAGE_META = {
  users: { title:'用户管理', btn:'新建用户' },

  roles: { title:'角色管理', btn:'新建角色' },

function nav(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  currentPage = id;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  const meta = PAGE_META[id];
  document.getElementById('page-title').textContent = meta.title;
  const btn = document.getElementById('main-add-btn');
  if (meta.btn) { btn.style.display=''; btn.lastChild.textContent = meta.btn; }
  else btn.style.display = 'none';
  pages[id] = 1;
  refreshAll();
}

function openAddModal() {
  const p = currentPage;
  if (p==='users') openUserModal();
  else if (p==='apps') openAppModal();
  else if (p==='roles') openRoleModal();
}

   SEARCH
═══════════════════════════════════════ */
function handleSearch(v) {
  searchQuery = v.toLowerCase();
  pages[currentPage] = 1;
  refreshAll();
}

/* ═══════════════════════════════════════
   RENDER USERS
═══════════════════════════════════════ */
function filteredUsers() {
  const sf = document.getElementById('user-filter-status').value;
  const rf = document.getElementById('user-filter-role').value;
  return DB.users.filter(u => {
    if (sf && u.status !== sf) return false;
    if (rf && u.role !== rf) return false;
    if (searchQuery && !u.name.toLowerCase().includes(searchQuery) && !u.email.toLowerCase().includes(searchQuery) && !u.id.toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

function renderUsers() {
  // populate role filter
  const rf = document.getElementById('user-filter-role');
  const cur = rf.value;
  rf.innerHTML = '<option value="">全部角色</option>';
  DB.roles.forEach(r => { const o=document.createElement('option'); o.value=r.id; o.textContent=r.name; rf.appendChild(o); });
  rf.value = cur;

  const users = filteredUsers();
  const total = users.length;
  const p = pages.users;
  const slice = users.slice((p-1)*PAGE_SIZE, p*PAGE_SIZE);

  const STATUS = {

/* ═══════════════════════════════════════
   PAGINATION
═══════════════════════════════════════ */
function renderPagination(containerId, total, current, key) {
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  const c = document.getElementById(containerId);
  let html = `<button class="page-btn" ${current<=1?'disabled':''} onclick="goPage('${key}',${current-1})">‹</button>`;
  for (let i=1;i<=totalPages;i++) {
    if (totalPages>7 && i>2 && i<totalPages-1 && Math.abs(i-current)>1) {
      if (i===3||i===totalPages-2) html+=`<span style="padding:0 4px;color:var(--text3);font-size:12px">…</span>`;
      continue;
    }
    html+=`<button class="page-btn ${i===current?'active':''}" onclick="goPage('${key}',${i})">${i}</button>`;
  }
  html+=`<button class="page-btn" ${current>=totalPages?'disabled':''} onclick="goPage('${key}',${current+1})">›</button>`;
  c.innerHTML = html;
}

function goPage(key, p) {
  pages[key] = p;
  if (key==='users') renderUsers();
  else if (key==='apps') renderApps();
  else if (key==='audit') renderAudit();
}

function openUserModal(id) {
  editingId = id||null;

  document.getElementById('u-pwd-row').style.display = id ? 'none' : '';

  const rs = document.getElementById('u-role');
  rs.innerHTML = DB.roles.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');

  const ac = document.getElementById('u-apps-check');
  ac.innerHTML = DB.apps.map(a=>
    `<label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;background:var(--surface2);padding:5px 10px;border-radius:7px;border:1px solid var(--border)">
      <input type="checkbox" value="${a.id}" style="margin:0"> ${a.name}
    </label>`
  ).join('');

  if (id) {
    const u = DB.users.find(x=>x.id===id);
    document.getElementById('u-name').value = u.name;
    document.getElementById('u-id').value = u.id;
    document.getElementById('u-email').value = u.email;
    document.getElementById('u-role').value = u.role;
    document.getElementById('u-status').value = u.status;

    ['u-name','u-id','u-email','u-password','u-password2'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('u-status').value='active';
  }

function saveUser() {
  const name = document.getElementById('u-name').value.trim();
  const uid = document.getElementById('u-id').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const role = document.getElementById('u-role').value;
  const status = document.getElementById('u-status').value;
  const apps = [...document.querySelectorAll('#u-apps-check input:checked')].map(c=>c.value);
  const pwd = document.getElementById('u-password').value;
  const pwd2 = document.getElementById('u-password2').value;

  if (!name||!uid||!email||!role) { toast('请填写必填字段','error'); return; }
  if (!editingId && pwd !== pwd2) { toast('两次密码不一致','error'); return; }
  if (!editingId && pwd.length < 8) { toast('密码至少8位','error'); return; }

  if (editingId) {
    const u = DB.users.find(x=>x.id===editingId);
    Object.assign(u, { name, email, role, status, apps, last:'刚刚' });
    addAudit('update', `用户 ${name}`);
    toast(`用户"${name}"已更新`,'success');
  } else {
    if (DB.users.find(u=>u.id===uid)) { toast('工号已存在','error'); return; }
    DB.users.push({ id:uid, name, email, role, apps, status, last:'刚刚' });
    addAudit('create', `用户 ${name}`);
    toast(`用户"${name}"已创建`,'success');
  }
  closeModal('user-modal');
  renderUsers();
}

/* ═══════════════════════════════════════
   DELETE / CONFIRM
═══════════════════════════════════════ */
function confirmDelete(type, id, name) {
  const descMap = {
    user: `确认删除用户"${name}"？此操作不可撤销，该用户将立即失去所有访问权限。`,
    app: `确认删除应用"${name}"？关联的用户权限将同步移除。`,
    role: `确认删除角色"${name}"？拥有该角色的用户将失去相关权限，请谨慎操作。`
  };
  document.getElementById('confirm-title').textContent = `删除${type==='user'?'用户':type==='app'?'应用':'角色'}`;
  document.getElementById('confirm-desc').textContent = descMap[type];
  const btn = document.getElementById('confirm-ok-btn');
  btn.onclick = () => doDelete(type, id, name);
  openModal('confirm-modal');
}

function doDelete(type, id, name) {
  if (type==='user') {
    DB.users = DB.users.filter(u=>u.id!==id);
    addAudit('delete', `用户 ${name}`);
    selectedUsers.delete(id);
    renderUsers();
  } else if (type==='app') {
    DB.apps = DB.apps.filter(a=>a.id!==id);
    DB.users.forEach(u=>{ u.apps = u.apps.filter(a=>a!==id); });
    addAudit('delete', `应用 ${name}`);
    renderApps();
    renderUsers();
  } else if (type==='role') {
    if (DB.users.some(u=>u.role===id)) { toast('该角色下还有用户，无法删除','error'); closeModal('confirm-modal'); return; }
    DB.roles = DB.roles.filter(r=>r.id!==id);
    if (activeRoleId===id) activeRoleId = DB.roles[0]?.id||null;
    addAudit('delete', `角色 ${name}`);
    renderRoles();
    renderUsers();
  }
  closeModal('confirm-modal');
  toast(`"${name}"已删除`,'success');
}

/* ═══════════════════════════════════════
   BULK OPERATIONS
═══════════════════════════════════════ */
function toggleUserSelect(id, cb) {
  if (cb.checked) selectedUsers.add(id);
  else selectedUsers.delete(id);
  updateBulkBar();
}

function toggleSelectAll(cb) {
  const filtered = filteredUsers();
  const slice = filtered.slice((pages.users-1)*PAGE_SIZE, pages.users*PAGE_SIZE);
  slice.forEach(u=>{ if(cb.checked) selectedUsers.add(u.id); else selectedUsers.delete(u.id); });
  renderUsers();
}

function updateBulkBar() {
  const bar = document.getElementById('user-bulk');
  if (selectedUsers.size>0) {
    bar.classList.add('open');
    document.getElementById('bulk-count').textContent = `已选 ${selectedUsers.size} 项`;
  } else {
    bar.classList.remove('open');
  }
  // sync checkboxes
  document.querySelectorAll('.user-check').forEach(cb=>{
    cb.checked = selectedUsers.has(cb.value);
  });
}

function bulkToggleStatus() {
  const ids = [...selectedUsers];
  ids.forEach(id => {
    const u = DB.users.find(x=>x.id===id);
    if (u) u.status = u.status==='active'?'disabled':'active';
  });
  toast(`已批量切换 ${ids.length} 名用户状态`,'success');
  addAudit('update',`批量状态变更 ${ids.length} 用户`);
  clearBulk();
  renderUsers();
}

function bulkDelete() {
  const ids = [...selectedUsers];
  DB.users = DB.users.filter(u=>!ids.includes(u.id));
  addAudit('delete',`批量删除 ${ids.length} 用户`);
  toast(`已删除 ${ids.length} 名用户`,'success');
  clearBulk();
  renderUsers();
}

function clearBulk() {
  selectedUsers.clear();
  updateBulkBar();
  document.getElementById('select-all-users').checked=false;
  document.querySelectorAll('.user-check').forEach(cb=>cb.checked=false);
}

/* ═══════════════════════════════════════
   EXPORT
═══════════════════════════════════════ */
function exportData() {
  const p = currentPage;
  let csv = '';
  if (p==='users') {
    csv = 'ID,姓名,邮箱,角色,状态,最后登录\n' +
      DB.users.map(u=>{ const r=DB.roles.find(x=>x.id===u.role); return `${u.id},${u.name},${u.email},${r?r.name:''},${u.status},${u.last}`; }).join('\n');
  } else if (p==='apps') {
    csv = '名称,类型,认证方式,域名,状态\n' +
      DB.apps.map(a=>`${a.name},${a.type},${a.auth},${a.url},${a.status}`).join('\n');
  } else if (p==='audit') {
    csv = '时间,操作者,事件,对象,IP\n' +
      DB.audit.map(l=>`${l.time},${l.actor},${l.type},${l.obj},${l.ip}`).join('\n');
  } else {
    toast('当前页面暂不支持导出','error'); return;
  }
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`iam-${p}-${Date.now()}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('导出成功','success');
}

/* ═══════════════════════════════════════
   AUDIT HELPER
═══════════════════════════════════════ */
function addAudit(type, obj) {
  const now = new Date();
  const t = now.toISOString().slice(0,16).replace('T',' ');
  DB.audit.unshift({ time:t, actor:'Super Admin', type, obj, ip:'192.168.1.1', result:'success' });
}

/* ═══════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════ */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); editingId=null; }

document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click', e=>{ if(e.target===o) closeModal(o.id); });
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(o=>closeModal(o.id)); });

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function toast(msg, type='') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor">${type==='success'?'<path d="M16.7 5.3a1 1 0 00-1.4 0L8 12.6 4.7 9.3a1 1 0 00-1.4 1.4l4 4a1 1 0 001.4 0l8-8a1 1 0 000-1.4z"/>':'<path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm-.75 4.75a.75.75 0 011.5 0v4.5a.75.75 0 01-1.5 0v-4.5zm.75 7.5a1 1 0 110 2 1 1 0 010-2z"/>'}</svg>${msg}`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='all .3s'; setTimeout(()=>el.remove(),300); },2800);
}

  renderUsers();
  renderApps();

refreshAll();
